name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:
  # Fired by berlindb/core on push to master (the cross-repo canary).
  repository_dispatch:
    types: [ core-updated ]

jobs:
  phpunit:
    name: PHP ${{ matrix.php }} / WooCommerce ${{ matrix.wc }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.3' ]
        # WooCommerce is built (pnpm monorepo), so we test released, pre-built plugin
        # zips from wordpress.org rather than a bare git checkout. 'latest' is the
        # authoritative gate.
        wc:  [ 'latest' ]

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Checkout berlindb/core
        uses: actions/checkout@v6
        with:
          repository: berlindb/core
          # The exact core commit when fired by the canary, else master.
          ref: ${{ github.event.client_payload.sha || 'master' }}
          path: berlindb-core

      - name: Download WooCommerce (pre-built plugin zip)
        run: |
          if [ "${{ matrix.wc }}" = "latest" ]; then
            URL="https://downloads.wordpress.org/plugin/woocommerce.zip"
          else
            URL="https://downloads.wordpress.org/plugin/woocommerce.${{ matrix.wc }}.zip"
          fi
          curl -fsSL "$URL" -o /tmp/woocommerce.zip
          unzip -q /tmp/woocommerce.zip -d "$GITHUB_WORKSPACE/wc-src"
          echo "WC version: $(grep -m1 'Version:' "$GITHUB_WORKSPACE/wc-src/woocommerce/woocommerce.php")"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, intl, gd, zip
          tools: composer
          coverage: none

      - name: Point composer at the checked-out core
        run: composer config repositories.berlindb-core path ./berlindb-core

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Use mysql_native_password auth
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot --ssl-mode=DISABLED --get-server-public-key -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root';"

      - name: Install subversion
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 latest

      - name: PHPUnit (capability test vs live WooCommerce)
        env:
          WC_PLUGIN_FILE: ${{ github.workspace }}/wc-src/woocommerce/woocommerce.php
        run: composer test
